appId: com.vocab-agent.desktop
productName: Vocab Agent
directories:
  output: dist-electron
files:
  - .next/**/*
  - "!.next/cache/**"
  - "!.next/types/**"
  - "!.next/diagnostics/**"
  - public/**/*
  - data/**/*
  - package.json
  - next-env.d.ts
  - dist-electron/**/*
  - "!node_modules/@upstash/vector/**"
  - "!node_modules/better-sqlite3/**"
  - "!node_modules/sharp/**"
  - "!node_modules/**/{test,tests,__tests__,spec}/**"
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.map"
  - "!node_modules/**/LICENSE*"
  - "!node_modules/**/CHANGELOG*"
  - "!node_modules/**/{.github,.eslintrc,.prettierrc,.babelrc,.editorconfig}"
  - "!node_modules/**/tsconfig.json"
  - "!node_modules/**/tsconfig.*.json"
  - "!node_modules/**/src/**"
asar: true
asarUnpack:
  - node_modules/@libsql/client/**/*
  - node_modules/@libsql/**/*.wasm
  - node_modules/.prisma/**/*
win:
  target: nsis
  icon: public/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
