appId: com.vocab-agent.desktop
productName: Vocab Agent
directories:
  output: dist-electron
files:
  - .next/**/*
  - "!.next/cache/**"
  - "!.next/types/**"
  - "!.next/diagnostics/**"
  - public/**/*
  - data/**/*
  - package.json
  - next-env.d.ts
  - dist-electron/*.js
  - "!dist-electron/*.map"
  - "!dist-electron/*.exe"
  - "!dist-electron/*.blockmap"
  - "!dist-electron/*.yml"
  - "!dist-electron/*.yaml"
  - "!dist-electron/win-unpacked/**"
  - "!dist-electron/.icon-ico/**"
  - "!dist-electron/.next/**"
  - "!node_modules/@upstash/vector/**"
  - "!node_modules/better-sqlite3/**"
  - "!node_modules/sharp/**"
  - "!node_modules/@types/**"
  - "!node_modules/@tauri-apps/**"
  - "!node_modules/ts-morph/**"
  - "!node_modules/@ts-morph/**"
  - "!node_modules/conf/**"
  - "!node_modules/**/{test,tests,__tests__,spec}/**"
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.map"
  - "!node_modules/**/LICENSE*"
  - "!node_modules/**/CHANGELOG*"
  - "!node_modules/**/{.github,.eslintrc,.prettierrc,.babelrc,.editorconfig}"
  - "!node_modules/**/tsconfig.json"
  - "!node_modules/**/tsconfig.*.json"
  - "!node_modules/**/src/**"
asar: false
win:
  target: nsis
  icon: public/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
