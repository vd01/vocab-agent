<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vocab Agent</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #e5e5e5; display: flex; align-items: center; justify-content: center; height: 100vh; }
.container { width: 400px; text-align: center; }
h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
.subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }
.input-group { margin-bottom: 16px; text-align: left; }
label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #e5e5e5; font-size: 14px; outline: none; transition: border-color 0.2s; }
input:focus { border-color: #3b82f6; }
input::placeholder { color: #555; }
.btn { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #3b82f6; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
.btn:hover { background: #2563eb; }
.btn:disabled { background: #1e3a5f; cursor: not-allowed; }
.error { color: #ef4444; font-size: 13px; margin-top: 8px; min-height: 20px; }
.status { font-size: 13px; color: #888; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>Vocab Agent Lite</h1>
  <p class="subtitle">首次使用，请配置服务端地址</p>
  <div class="input-group">
    <label>服务端地址</label>
    <input type="url" id="urlInput" placeholder="https://example.duckdns.org:31588" autofocus>
  </div>
  <div class="input-group">
    <label>登录密码（可选）</label>
    <input type="password" id="passInput" placeholder="留空则不自动登录">
  </div>
  <button class="btn" id="connectBtn" onclick="connect()">连接</button>
  <div class="error" id="error"></div>
  <div class="status" id="status"></div>
</div>
<script>
async function connect() {
  const url = document.getElementById('urlInput').value.trim().replace(/\/+$/, '');
  const pass = document.getElementById('passInput').value;
  const btn = document.getElementById('connectBtn');
  const err = document.getElementById('error');
  const status = document.getElementById('status');

  if (!url) { err.textContent = '请输入服务端地址'; return; }

  try { new URL(url); } catch { err.textContent = '地址格式不正确'; return; }

  err.textContent = '';
  btn.disabled = true;
  status.textContent = '正在检测服务端...';

  try {
    const { invoke } = window.__TAURI_INTERNALS__;
    const ok = await invoke('check_server', { url: url });
    if (!ok) throw new Error('服务端返回异常状态');
  } catch (e) {
    err.textContent = '无法连接到服务端: ' + (e.message || e);
    btn.disabled = false;
    status.textContent = '';
    return;
  }

  status.textContent = '正在保存配置...';

  try {
    const { invoke } = window.__TAURI_INTERNALS__;
    await invoke('config_set', { partial: { server_url: url } });

    if (pass) {
      await invoke('password_save', { password: pass });
      try {
        await invoke('auto_login');
      } catch {}
    }

    status.textContent = '正在跳转...';
    window.location.href = url;
  } catch (e) {
    err.textContent = '保存失败: ' + e.message;
    btn.disabled = false;
    status.textContent = '';
  }
}

document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') connect();
});
</script>
</body>
</html>
