<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocab Agent - 连接失败</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 400px;
      padding: 2rem;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    p {
      font-size: 0.875rem;
      color: #9ca3af;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .url {
      color: #60a5fa;
      word-break: break-all;
    }
    .buttons {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }
    button {
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.14); }
    .btn-local {
      background: rgba(255,255,255,0.05);
      color: #9ca3af;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .btn-local:hover { background: rgba(255,255,255,0.1); color: #e0e0e0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x26A0;</div>
    <h1>无法连接到服务器</h1>
    <p id="message">正在尝试连接 <span class="url" id="url-display"></span>，请检查网络连接或服务器状态。</p>
    <div class="buttons">
      <button class="btn-primary" onclick="retry()">重试</button>
      <button class="btn-secondary" onclick="openSettings()">设置</button>
      <button class="btn-local" onclick="switchToLocal()">本地模式</button>
    </div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const remoteUrl = urlParams.get('url') || '';
    document.getElementById('url-display').textContent = remoteUrl;

    function retry() {
      window.location.href = remoteUrl;
    }

    function openSettings() {
      const baseUrl = remoteUrl ? new URL(remoteUrl).origin : 'http://localhost:3088';
      window.location.href = baseUrl + '/settings';
    }

    function switchToLocal() {
      window.electronAPI.switchMode('local');
    }
  </script>
</body>
</html>
